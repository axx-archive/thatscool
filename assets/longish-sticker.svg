    <g fill="#11ed32" stroke="#0a0a0a" stroke-width="5">
      <circle cx="11" cy="70" r="13"/>
      <circle cx="229" cy="61" r="13"/>
      <path d="M57 244c13-8 28-8 38 0l-4 11H55Z"/>
      <path d="M146 244c13-8 28-8 38 0l2 11h-39Z"/>
