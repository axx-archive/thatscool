      <path d="M395 154h115l-5 77H399Z" fill="url(#terminalGrid)"/>
      <path d="m402 207 22-2 19-19 20 6 34-31" fill="none" stroke="#00d9ff" stroke-width="4"/>
      <text x="404" y="171" fill="#7fd3ff" font-family="Courier New, monospace" font-size="8" font-weight="700">IMPULSE</text>
      <text x="404" y="184" fill="#fff" font-family="Courier New, monospace" font-size="11" font-weight="700">MUTED</text>
    </g>
  </g>

  <path d="M72 253h456l-26 50H98Z" fill="url(#desk)" stroke="#263d49" stroke-width="4"/>
  <path d="M118 264h139l-12 23H106Z" fill="#203039" stroke="#71848e" stroke-width="2"/>
  <g stroke="#93a3ab" stroke-width="2">
    <path d="m126 270 118 0M119 277h120M114 283h123"/>
    <path d="M138 265v20M156 265v20M174 265v20M192 265v20M210 265v20M228 265v20"/>
  </g>
  <rect x="382" y="263" width="93" height="25" rx="12.5" fill="#f4f8f9" stroke="#405862" stroke-width="2"/>
  <text x="429" y="279" fill="#102b49" font-family="Georgia, serif" font-size="10" font-style="italic" font-weight="700" text-anchor="middle">log off early</text>

  <g transform="translate(250 184) scale(0.42)">
