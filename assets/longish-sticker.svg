<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" role="img" aria-labelledby="title desc">
  <title id="title">LONGISH</title>
  <desc id="desc">A glossy 2009 financial-terminal inspired LONGISH sticker with the Cool Guy character at a Wall Street monitor desk.</desc>
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#269bd1"/>
      <stop offset="0.42" stop-color="#1677b8"/>
      <stop offset="1" stop-color="#0b2845"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.22" stop-color="#b9c9d1"/>
      <stop offset="0.5" stop-color="#f4f8f9"/>
      <stop offset="1" stop-color="#80909a"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.48"/>
      <stop offset="0.85" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d5dde0"/>
      <stop offset="1" stop-color="#667780"/>
    </linearGradient>
    <pattern id="terminalGrid" width="18" height="14" patternUnits="userSpaceOnUse">
      <path d="M18 0H0v14" fill="none" stroke="#8fd5ff" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
    <filter id="screenGlow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#001d31" flood-opacity="0.6"/>
    </filter>
  </defs>

  <path d="M77 24h446c22 0 40 18 40 40v247c0 22-18 40-40 40H363l-19 15h-88l-19-15H77c-22 0-40-18-40-40V64c0-22 18-40 40-40Z" fill="#fff" stroke="#d7dce2" stroke-width="3"/>
  <path d="M83 42h434c15 0 28 13 28 28v234c0 15-13 28-28 28H357l-18 15h-78l-18-15H83c-15 0-28-13-28-28V70c0-15 13-28 28-28Z" fill="url(#badge)" stroke="#0b2137" stroke-width="5"/>
  <path d="M84 50h432c11 0 20 9 20 20v51c-80 24-165 32-255 24-70-6-143-19-217-41V70c0-11 9-20 20-20Z" fill="url(#gloss)"/>

  <text x="78" y="70" fill="#cdeeff" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="2">THE PATIENT MONEY DEPT. / DESK 01</text>
  <text x="79" y="117" fill="#08243d" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="900" letter-spacing="-2" opacity="0.8">LONGISH</text>
  <text x="76" y="113" fill="#fffdf7" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="900" letter-spacing="-2">LONGISH</text>
  <rect x="399" y="78" width="118" height="29" rx="14" fill="url(#chrome)" stroke="#17384f" stroke-width="2"/>
  <circle cx="417" cy="92" r="6" fill="#68b82e" stroke="#315e14" stroke-width="2"/>
  <text x="430" y="96" fill="#102b49" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" letter-spacing="1">STILL HOLDING</text>

  <!-- Trading monitors -->
  <g filter="url(#screenGlow)">
    <g>
      <path d="M79 143h137l-6 100H85Z" fill="#081d2a" stroke="url(#chrome)" stroke-width="6"/>
      <path d="M89 154h116l-5 77H94Z" fill="url(#terminalGrid)"/>
      <path d="m98 211 18-10 18 4 18-23 18 10 26-28" fill="none" stroke="#68b82e" stroke-width="4"/>
