    <path d="M47 39c19-20 126-24 150 5 18 22 17 127-4 162-18 30-124 33-149 4-23-27-20-146 3-171Z" fill="#11ed32" transform="translate(9 9)"/>
    <path d="M47 39c19-20 126-24 150 5 18 22 17 127-4 162-18 30-124 33-149 4-23-27-20-146 3-171Z" fill="#fff" stroke="#0a0a0a" stroke-width="6"/>
    <g fill="#0a0a0a">
      <ellipse cx="88" cy="99" rx="35" ry="48" transform="rotate(-5 88 99)"/>
      <ellipse cx="156" cy="98" rx="34" ry="47" transform="rotate(5 156 98)"/>
    </g>
    <g fill="#fff">
      <ellipse cx="91" cy="99" rx="13" ry="22"/>
      <ellipse cx="153" cy="98" rx="13" ry="22"/>
    </g>
    <path d="M61 157c26 25 74 36 113 12 12-7 20-6 24 0-9 30-48 45-85 41-29-3-55-19-66-39-4-8 4-19 14-14Z" fill="#0a0a0a"/>
    <path d="M65 159c24 18 63 26 96 10" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="6" opacity="0.22"/>
  </g>
  <path d="M296 261h14l-4 18-9 8-9-8Z" fill="#bf2731" stroke="#5f1016" stroke-width="2"/>

  <rect x="81" y="304" width="438" height="20" rx="10" fill="#071b2b" stroke="#4f7184" stroke-width="2"/>
  <text x="300" y="318" fill="#d7f3ff" font-family="Courier New, Courier, monospace" font-size="9.5" font-weight="700" text-anchor="middle" letter-spacing="1.25">READ-ONLY  •  LONG-HORIZON  •  PATIENCE COMPOUNDS</text>
</svg>
