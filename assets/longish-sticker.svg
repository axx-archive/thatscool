      <path d="M235 141h129v85H237Z" fill="url(#terminalGrid)"/>
      <g fill="#27b7a5">
        <rect x="251" y="193" width="13" height="21"/><rect x="273" y="176" width="13" height="38"/><rect x="295" y="183" width="13" height="31"/><rect x="317" y="156" width="13" height="58"/><rect x="339" y="168" width="13" height="46"/>
      </g>
      <text x="247" y="155" fill="#fff" font-family="Courier New, monospace" font-size="8" font-weight="700">READ &gt; REACT</text>
