<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" role="img" aria-labelledby="title desc">
  <title id="title">STRIDE workspaceOS</title>
  <desc id="desc">A 1990s office-sim inspired STRIDE workspaceOS sticker with the Cool Guy character.</desc>
  <defs>
