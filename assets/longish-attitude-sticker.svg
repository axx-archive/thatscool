<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 460" role="img" aria-labelledby="title desc">
  <title id="title">Longish</title>
  <desc id="desc">A black app-icon sticker for investing for the long run, more or less.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="2" dy="15" stdDeviation="10" flood-color="#080808" flood-opacity=".28"/>
    </filter>
    <linearGradient id="blackGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#282725"/>
      <stop offset=".5" stop-color="#121212"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="2" r=".65" fill="#fff" opacity=".09"/>
      <circle cx="6" cy="6" r=".55" fill="#fff" opacity=".06"/>
    </pattern>
  </defs>

  <g filter="url(#shadow)">
    <path d="M102 8h256l50 25 38 62 6 264-26 55-62 38H99l-58-31-33-62V103l31-62Z" fill="#fff"/>
    <path d="M105 28h246l43 20 34 54 5 249-22 47-54 34H105l-50-27-27-54V108l27-50Z" fill="url(#blackGlass)" stroke="#050505" stroke-width="5"/>
    <path d="M107 38h240l39 19 30 49 2 111c-113-36-252-36-374 4V112l26-45Z" fill="url(#shine)"/>
    <path d="M49 58h359v330H49Z" fill="url(#grain)"/>

    <text x="230" y="81" fill="#f4eddf" font-family="Courier New, monospace" font-size="14" font-weight="700" letter-spacing="2.6" text-anchor="middle">INVESTING FOR THE LONG RUN.</text>

    <g fill="none" stroke-linecap="square" stroke-linejoin="miter" stroke-width="18">
      <path d="M76 125h87l60 58" stroke="#f4eddf"/>
      <path d="M76 183h286" stroke="#dfff21"/>
      <path d="M76 241h87l60-58" stroke="#ff5145"/>
    </g>
    <path d="m343 164 31 19-31 19" fill="none" stroke="#dfff21" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter"/>

    <g transform="rotate(-2 230 300)">
      <rect x="46" y="257" width="368" height="101" rx="48" fill="#f4eddf" stroke="#050505" stroke-width="6"/>
      <text x="230" y="327" fill="#111" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800" letter-spacing="-6" text-anchor="middle">Longish</text>
    </g>

    <text x="230" y="400" fill="#ff6a5d" font-family="Courier New, monospace" font-size="19" font-weight="700" letter-spacing="4" text-anchor="middle">MORE OR LESS.</text>
    <path d="M131 415h198" stroke="#f4eddf" stroke-width="2" stroke-dasharray="3 9"/>
  </g>
</svg>
