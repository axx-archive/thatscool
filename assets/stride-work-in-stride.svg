<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">Work in Stride</title>
  <desc id="desc">A cobalt workplace operating system sticker with 1990s software label details.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-25%" width="135%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="9" flood-color="#111318" flood-opacity=".25"/>
    </filter>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#416bff"/>
      <stop offset="1" stop-color="#2548e8"/>
    </linearGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#d7e3ff" stroke-opacity=".16" stroke-width="1"/>
    </pattern>
  </defs>

  <g filter="url(#shadow)">
    <path d="M26 10H700L750 60V218L728 240H30L10 220V30Z" fill="#fff"/>
    <path d="M34 25H693L734 66V210L718 225H37L25 213V35Z" fill="url(#blue)" stroke="#111318" stroke-width="4"/>
    <path d="M695 25L734 65H695Z" fill="#caff2c" stroke="#111318" stroke-width="4" stroke-linejoin="round"/>
    <path d="M43 48H688" stroke="#111318" stroke-width="4"/>
    <path d="M45 50H687V208H45Z" fill="url(#grid)"/>

    <g fill="#111318">
      <rect x="48" y="34" width="11" height="8" rx="1"/>
      <rect x="64" y="34" width="11" height="8" rx="1"/>
      <rect x="80" y="34" width="11" height="8" rx="1"/>
    </g>
    <text x="108" y="43" fill="#111318" font-family="Courier New, monospace" font-size="15" font-weight="700" letter-spacing="2">WORKPLACE_OS.EXE</text>

    <text x="49" y="111" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" letter-spacing="-2">WORK IN</text>
    <text x="49" y="194" fill="#65f5ff" opacity=".85" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="99" font-style="italic" font-weight="900" letter-spacing="-8">STRIDE</text>
    <text x="43" y="187" fill="#fff" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="99" font-style="italic" font-weight="900" letter-spacing="-8">STRIDE</text>

    <rect x="558" y="65" width="142" height="34" fill="#111318"/>
    <text x="571" y="87" fill="#caff2c" font-family="Courier New, monospace" font-size="14" font-weight="700" letter-spacing="1.3">HUMANS + AGENTS</text>
    <path d="M573 126h106M573 139h75M573 152h94" stroke="#fff" stroke-width="4" stroke-linecap="square"/>
    <path d="M670 122l28 17-13 4-5 14Z" fill="#caff2c" stroke="#111318" stroke-width="3" stroke-linejoin="round"/>

    <text x="560" y="198" fill="#111318" font-family="Courier New, monospace" font-size="12" font-weight="700" letter-spacing="1.4">WS/OS  1995 → ∞</text>
  </g>
</svg>
